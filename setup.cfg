[flake8]
max-line-length = 120
exclude =
    venv,
    .worktrees,
    migrations,
    __pycache__,
    frontend
extend-ignore = E203, W503

[isort]
profile = black
line_length = 120

[tool:pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py
python_classes = *Test*
python_functions = test_*
