{% extends "base.html" %}
{% block title %}Too Many Requests{% endblock %}
{% block content %}
<div class="screen screen--no-nav" style="display: flex; align-items: center; justify-content: center; text-align: center;">
  <div>
    <div style="font-size: 48px; margin-bottom: var(--space-lg);"><i class="bi bi-hourglass-split"></i></div>
    <h1 style="margin-bottom: var(--space-sm);">Slow Down</h1>
    <p class="text-muted mb-xl">You've made too many requests. Please wait a moment and try again.</p>
    <a href="/" class="btn btn-primary">Go Home</a>
  </div>
</div>
{% endblock %}
