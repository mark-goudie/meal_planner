{% extends "base.html" %}
{% block title %}Check Your Email{% endblock %}
{% block content %}
<div class="auth-container screen--no-nav">
    <h1 class="auth-title">Check Your Email</h1>
    <p class="text-muted" style="text-align: center; margin-bottom: var(--space-lg);">If an account exists with that email, you'll receive a password reset link shortly.</p>
    <p class="auth-link"><a href="{% url 'login' %}">Back to login</a></p>
</div>
{% endblock %}
