{% extends "base.html" %}
{% block title %}Set New Password{% endblock %}
{% block content %}
<div class="auth-container screen--no-nav">
    <h1 class="auth-title">Set a New Password</h1>
    {% if validlink %}
    <form class="auth-form" method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label" for="id_new_password1">New password</label>
            <input type="password" name="new_password1" id="id_new_password1" class="form-input" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="id_new_password2">Confirm password</label>
            <input type="password" name="new_password2" id="id_new_password2" class="form-input" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Change Password</button>
    </form>
    {% else %}
    <p class="text-muted" style="text-align: center; margin-bottom: var(--space-lg);">This password reset link is invalid or has expired. Please request a new one.</p>
    <p class="auth-link"><a href="{% url 'password_reset' %}">Request new link</a></p>
    {% endif %}
</div>
{% endblock %}
