<div id="shop-item-{{ item.pk }}"
     class="shop-item{% if item.checked %} shop-item--checked{% endif %}"
     hx-post="{% url 'shop_toggle' item.pk %}"
     hx-target="#shop-item-{{ item.pk }}"
     hx-swap="outerHTML">
  <div class="shop-item__check"></div>
  <span class="shop-item__label">{{ item.name }}
    {% if item.added_by %}
    <span class="text-dim" style="font-size: 9px;">({{ item.added_by.username }})</span>
    {% endif %}
  </span>
</div>
