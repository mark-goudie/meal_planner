<div class="picker-overlay" x-data="{ open: true }" x-show="open"
     @click.self="open = false; $el.remove()" x-transition>
  <div class="picker">
    <div class="picker__handle"></div>
    <div class="picker__header">
      <span class="picker__title">Find an image</span>
      <button class="btn btn-ghost btn-sm" @click="open = false; $el.closest('.picker-overlay').remove()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div style="padding: var(--space-md) var(--space-lg);">
      <input type="search" class="search-input" value="{{ query }}"
             placeholder="Search food photos..."
             name="q"
             hx-get="{% url 'image_search' recipe.pk %}"
             hx-trigger="input changed delay:500ms"
             hx-target="closest .picker-overlay"
             hx-swap="outerHTML"
             style="padding-left: var(--space-lg);">
    </div>

    {% if error %}
    <div style="padding: var(--space-lg); text-align: center;">
      <p class="text-muted">{{ error }}</p>
    </div>
    {% elif photos %}
    <div class="picker__body" style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-sm); padding: 0 var(--space-lg) var(--space-lg);">
      {% for photo in photos %}
      <form method="post" action="{% url 'image_select' recipe.pk %}">
        {% csrf_token %}
        <input type="hidden" name="image_url" value="{{ photo.regular }}">
        <button type="submit" style="padding: 0; border: none; background: none; cursor: pointer; width: 100%; border-radius: var(--radius-md); overflow: hidden;">
          <img src="{{ photo.thumb }}" alt="{{ photo.alt }}"
               style="width: 100%; height: 100px; object-fit: cover; display: block; border-radius: var(--radius-md);">
        </button>
        <div class="text-dim" style="font-size: 9px; margin-top: 2px;">
          Photo by <a href="{{ photo.credit_link }}?utm_source=meal_planner&utm_medium=referral"
                      target="_blank" style="color: var(--text-muted);">{{ photo.credit }}</a>
        </div>
      </form>
      {% endfor %}
    </div>
    {% else %}
    <div style="padding: var(--space-xl); text-align: center;">
      <p class="text-muted">No photos found. Try a different search term.</p>
    </div>
    {% endif %}
  </div>
</div>
