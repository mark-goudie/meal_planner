<button class="btn btn-icon btn-ghost"
        hx-post="{% url 'toggle_favourite' pk=recipe.pk %}"
        hx-target="this"
        hx-swap="outerHTML"
        aria-label="{% if is_favourited %}Remove from favourites{% else %}Add to favourites{% endif %}">
  {% if is_favourited %}
    <span style="color: var(--accent); font-size: 24px;">&#9829;</span>
  {% else %}
    <span style="color: var(--text-dim); font-size: 24px;">&#9825;</span>
  {% endif %}
</button>
